<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tortuga Burg — Painel Admin</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#111;
      color:#fff;
      margin:0;
      padding:20px;
    }

    h1{
      color:#ff7b00;
    }

    .card{
      background:#1e1e1e;
      padding:20px;
      border-radius:12px;
      margin-bottom:20px;
      border:1px solid #333;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th, td{
      padding:12px;
      border-bottom:1px solid #333;
      text-align:left;
    }

    th{
      color:#ff7b00;
    }

    .status{
      padding:6px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:bold;
    }

    .pending{
      background:#5c4300;
      color:#ffd166;
    }

    .preparing{
      background:#4b1f00;
      color:#ff8c42;
    }

    .delivery{
      background:#002d5c;
      color:#5ab0ff;
    }

    .done{
      background:#003d1f;
      color:#57ff9a;
    }

    .cancelled{
      background:#5c0000;
      color:#ff6b6b;
    }

    button{
      border:none;
      padding:8px 12px;
      border-radius:8px;
      cursor:pointer;
      font-weight:bold;
    }

    .btn-next{
      background:#ff7b00;
      color:#fff;
    }

    .btn-cancel{
      background:#c62828;
      color:#fff;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    .kpis{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:16px;
      margin-bottom:20px;
    }

    .kpi{
      background:#1e1e1e;
      padding:20px;
      border-radius:12px;
      border:1px solid #333;
    }

    .kpi h2{
      margin:0;
      color:#ff7b00;
    }

    .kpi p{
      margin-top:8px;
      color:#aaa;
    }
  </style>
</head>

<body>

<div class="topbar">
  <h1>🍔 Tortuga Burg Admin</h1>

  <button onclick="simulateNewOrder()">
    Novo Pedido Fake
  </button>
</div>

<div class="kpis" id="kpis"></div>

<div class="card">
  <table>
    <thead>
      <tr>
        <th>Pedido</th>
        <th>Cliente</th>
        <th>Total</th>
        <th>Pagamento</th>
        <th>Status</th>
        <th>Ações</th>
      </tr>
    </thead>

    <tbody id="ordersTableBody"></tbody>
  </table>
</div>

<script>
'use strict';

/* ======================================================
   ESTADO
====================================================== */

let orders = [];

/* ======================================================
   STATUS
====================================================== */

const STATUS_MAP = {
  pending: {
    label: 'Pendente',
    class: 'pending',
    next: 'preparing',
    nextLabel: '🔥 Preparar'
  },

  preparing: {
    label: 'Preparando',
    class: 'preparing',
    next: 'delivery',
    nextLabel: '🛵 Enviar'
  },

  delivery: {
    label: 'Entrega',
    class: 'delivery',
    next: 'done',
    nextLabel: '✅ Concluir'
  },

  done: {
    label: 'Concluído',
    class: 'done',
    next: null
  },

  cancelled: {
    label: 'Cancelado',
    class: 'cancelled',
    next: null
  }
};

/* ======================================================
   UTIL
====================================================== */

const fmt = (v) =>
  new Intl.NumberFormat(
    'pt-BR',
    {
      style:'currency',
      currency:'BRL'
    }
  ).format(v);

/* ======================================================
   LOCAL STORAGE
====================================================== */

const loadOrders = () => {

  orders = JSON.parse(
    localStorage.getItem('snapburg_orders') || '[]'
  );

  orders.forEach(order => {

    if (!order.status) {
      order.status = 'pending';
    }

  });

};

const saveOrders = () => {

  localStorage.setItem(
    'snapburg_orders',
    JSON.stringify(orders)
  );

};

/* ======================================================
   MOCK
====================================================== */

const createMockOrders = () => {

  if (orders.length > 0) return;

  orders = [

    {
      id:'#1001',

      customer:{
        name:'Carlos Silva'
      },

      payment:'PIX',

      totals:{
        total:59.90
      },

      status:'pending'
    },

    {
      id:'#1002',

      customer:{
        name:'Ana Souza'
      },

      payment:'Cartão',

      totals:{
        total:89.90
      },

      status:'preparing'
    },

    {
      id:'#1003',

      customer:{
        name:'Lucas Ferreira'
      },

      payment:'Dinheiro',

      totals:{
        total:42.50
      },

      status:'delivery'
    }

  ];

  saveOrders();

};

/* ======================================================
   KPIS
====================================================== */

const renderKpis = () => {

  const totalOrders = orders.length;

  const doneOrders =
    orders.filter(o => o.status === 'done').length;

  const revenue =
    orders
      .filter(o => o.status === 'done')
      .reduce((acc, order) =>
        acc + order.totals.total, 0);

  const pending =
    orders.filter(o => o.status === 'pending').length;

  const container =
    document.getElementById('kpis');

  container.innerHTML = `
  
    <div class="kpi">
      <h2>${totalOrders}</h2>
      <p>Pedidos</p>
    </div>

    <div class="kpi">
      <h2>${doneOrders}</h2>
      <p>Concluídos</p>
    </div>

    <div class="kpi">
      <h2>${pending}</h2>
      <p>Pendentes</p>
    </div>

    <div class="kpi">
      <h2>${fmt(revenue)}</h2>
      <p>Receita</p>
    </div>

  `;
};

/* ======================================================
   TABELA
====================================================== */

const renderTable = () => {

  const tbody =
    document.getElementById('ordersTableBody');

  tbody.innerHTML = '';

  orders.forEach(order => {

    const status =
      STATUS_MAP[order.status];

    const tr =
      document.createElement('tr');

    tr.innerHTML = `
    
      <td>
        <strong>${order.id}</strong>
      </td>

      <td>
        ${order.customer.name}
      </td>

      <td>
        ${fmt(order.totals.total)}
      </td>

      <td>
        ${order.payment}
      </td>

      <td>
        <span class="status ${status.class}">
          ${status.label}
        </span>
      </td>

      <td>

        ${
          status.next
          ?
          `
          <button
            class="btn-next"
            onclick="updateStatus(
              '${order.id}',
              '${status.next}'
            )"
          >
            ${status.nextLabel}
          </button>
          `
          :
          ''
        }

        ${
          order.status !== 'done'
          &&
          order.status !== 'cancelled'
          ?
          `
          <button
            class="btn-cancel"
            onclick="cancelOrder('${order.id}')"
          >
            Cancelar
          </button>
          `
          :
          ''
        }

      </td>
    
    `;

    tbody.appendChild(tr);

  });

};

/* ======================================================
   STATUS
====================================================== */

const updateStatus = (
  orderId,
  newStatus
) => {

  const order =
    orders.find(o => o.id === orderId);

  if (!order) return;

  order.status = newStatus;

  saveOrders();

  renderTable();

  renderKpis();

};

const cancelOrder = (orderId) => {

  const order =
    orders.find(o => o.id === orderId);

  if (!order) return;

  order.status = 'cancelled';

  saveOrders();

  renderTable();

  renderKpis();

};

/* ======================================================
   NOVO PEDIDO FAKE
====================================================== */

const simulateNewOrder = () => {

  const names = [
    'João',
    'Pedro',
    'Camila',
    'Fernanda',
    'Ricardo'
  ];

  const payments = [
    'PIX',
    'Cartão',
    'Dinheiro'
  ];

  const randomName =
    names[
      Math.floor(
        Math.random() * names.length
      )
    ];

  const randomPayment =
    payments[
      Math.floor(
        Math.random() * payments.length
      )
    ];

  const randomTotal =
    Number(
      (Math.random() * 100 + 20)
      .toFixed(2)
    );

  const newOrder = {

    id: '#' + Math.floor(
      Math.random() * 9999
    ),

    customer:{
      name: randomName
    },

    payment: randomPayment,

    totals:{
      total: randomTotal
    },

    status:'pending'
  };

  orders.unshift(newOrder);

  saveOrders();

  renderTable();

  renderKpis();

};

/* ======================================================
   INIT
====================================================== */

document.addEventListener(
  'DOMContentLoaded',
  () => {

    loadOrders();

    createMockOrders();

    renderTable();

    renderKpis();

    console.log(
      '🍔 Painel carregado.'
    );

  }
);
</script>

</body>
</html>
